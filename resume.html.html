<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>個人履歷</title>

<style>
:root{
  --accent:#d6336c;
  --bg:#f5f5f7;
  --card:#ffffff;
  --muted:#666;
  font-family:'Noto Sans TC',sans-serif;
}

body{
  margin:0;
  background:var(--bg);
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.resume{
  display:grid;
  grid-template-columns:280px 1fr;
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* 左側 */
.left{
  background:#2f6fa3;
  color:white;
  padding:20px;
}

.photo{
  width:120px;
  height:120px;
  margin:0 auto 16px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid white;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1{
  text-align:center;
  margin:10px 0 0;
}

h2{
  text-align:center;
  font-size:14px;
  font-weight:normal;
  margin:4px 0 20px;
}

.section{
  margin-top:20px;
}

.section h3{
  font-size:14px;
  border-bottom:1px solid rgba(255,255,255,0.4);
  padding-bottom:4px;
}

.info{
  font-size:13px;
  margin:6px 0;
}

/* 右側 */
.right{
  padding:24px;
}

.right h3{
  margin-bottom:6px;
  border-bottom:2px solid #eee;
  padding-bottom:4px;
}

.item{
  margin-bottom:12px;
}

.meta{
  font-size:12px;
  color:var(--muted);
}

.skill-bar{
  background:#eee;
  height:6px;
  border-radius:10px;
  margin:6px 0;
}

.skill-bar div{
  height:100%;
  background:var(--accent);
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">
<div class="resume">

<!-- 左 -->
<div class="left">

<div class="photo">
  <img src="photo.jpg">
</div>

<h1>你的名字</h1>
<h2>亞洲大學 時尚設計系</h2>

<div class="section">
<h3>聯絡資訊</h3>
<div class="info">📧 your@email.com</div>
<div class="info">📞 0912-345-678</div>
</div>

<div class="section">
<h3>技能</h3>
<div>手繪</div>
<div class="skill-bar"><div style="width:90%"></div></div>

<div>Illustrator</div>
<div class="skill-bar"><div style="width:70%"></div></div>
</div>

</div>

<!-- 右 -->
<div class="right">

<h3>個人簡介</h3>
<p>熱愛服裝設計，擅長手繪與創意發想。</p>

<h3>學歷</h3>
<div class="item">
<strong>亞洲大學</strong>
<div class="meta">時尚設計系</div>
</div>

<h3>經驗</h3>
<div class="item">
<strong>校園展覽</strong>
<div class="meta">2023</div>
<p>參與服裝設計作品展出。</p>
</div>

</div>

</div>
</div>

</body>
</html>
